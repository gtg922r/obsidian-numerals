name: Build And Release obsidian plugin

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "*" # Push events to matching any tag format, i.e. 1.0, 20.15.10

env:
  PLUGIN_NAME: numerals # Change this to the name of your plugin-id folder

permissions:
  attestations: write
  contents: write
  id-token: write
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Build
        run: |
          npm install
          npm run build --if-present
          node scripts/prepare-release-artifacts.mjs ${{ github.ref_name }}
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            release/${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
            release/${{ env.PLUGIN_NAME }}/main.js
            release/${{ env.PLUGIN_NAME }}/manifest.json
            release/${{ env.PLUGIN_NAME }}/styles.css
      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          body: |
            # Numerals ${{ github.ref_name }}
            -
          files: |
            release/${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
            release/${{ env.PLUGIN_NAME }}/main.js
            release/${{ env.PLUGIN_NAME }}/manifest.json
            release/${{ env.PLUGIN_NAME }}/styles.css
